<div class="layout-wrapper">
      <!-- Sidebar -->
      <app-sidebar [isOpen]="sidebarOpen()" (close)="closeSidebar()" />

      <!-- Overlay for mobile -->
      @if (sidebarOpen()) {
        <div class="sidebar-overlay" (click)="closeSidebar()"></div>
      }

      <!-- Main -->
      <div class="layout-main" [class.sidebar-open]="sidebarOpen()">
        <app-topbar (toggleSidebar)="toggleSidebar()" />
        <main class="layout-content">
          <router-outlet />
        </main>
      </div>

      <!-- IA Agent -->
      <app-ia-agent />
    </div>
